<!DOCTYPE html>
<html>
<head>
    <title>K8s AI Runbook</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f6f8;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 700px;
            margin-top: 30px;
        }

        .chat-box {
            background: white;
            padding: 20px;
            height: 400px;
            overflow-y: auto;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .message {
            margin-bottom: 15px;
        }

        .user {
            text-align: right;
            color: blue;
        }

        .bot {
            text-align: left;
            color: green;
        }

        .input-box {
            margin-top: 10px;
            display: flex;
        }

        input {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            margin-left: 10px;
            padding: 10px 15px;
            border: none;
            background: #007bff;
            color: white;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        .loading {
            color: gray;
            font-style: italic;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>🚀 Kubernetes AI Runbook Assistant</h2>

    <div id="chat" class="chat-box"></div>

    <div class="input-box">
        <input type="text" id="query" placeholder="Ask something...">
        <button onclick="askAI()">Ask</button>
    </div>
</div>

<script>
async function askAI() {
    const queryInput = document.getElementById("query");
    const chat = document.getElementById("chat");

    const query = queryInput.value;
    if (!query) return;

    // Show user message
    chat.innerHTML += `<div class="message user">🧑 ${query}</div>`;

    // Show loading
    const loadingId = Date.now();
    chat.innerHTML += `<div id="${loadingId}" class="message bot loading">🤖 Thinking...</div>`;
    chat.scrollTop = chat.scrollHeight;

    queryInput.value = "";

    const res = await fetch("/ask", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ query })
    });

    const data = await res.json();

    // Replace loading with actual answer
    document.getElementById(loadingId).innerHTML =
        `<div class="message bot">🤖 ${data.answer}</div>`;

    chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
